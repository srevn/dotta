# Uncrustify configuration for dotta
# Style: K&R braces, 4-space indent, 100 column limit

# ═══════════════════════════════════════════════════════════════════
# General
# ═══════════════════════════════════════════════════════════════════

newlines                        = lf
input_tab_size                  = 4
output_tab_size                 = 4
utf8_bom                        = remove
utf8_force                      = true

# ═══════════════════════════════════════════════════════════════════
# Indentation
# ═══════════════════════════════════════════════════════════════════

indent_columns                  = 4
indent_with_tabs                = 0       # spaces only
indent_switch_case              = 4       # indent case labels from switch
indent_switch_body              = 0       # case body indented from case (inherited from case indent)
indent_case_brace               = 0       # { after case at case indent level
indent_label                    = 1       # goto labels: 1 space indent (left-flushed)
indent_continue                 = 4       # continuation indent
indent_align_assign             = true    # align continuation of assignment to RHS of =
indent_col1_comment             = false   # don't force column-1 comments
indent_paren_close              = 2       # closing ) at body/statement level, not param level
indent_compound_literal_return  = false   # don't double-indent compound literals in return

# Function parameter indentation: use indent_columns (4 spaces), NOT align to paren
indent_func_call_param          = true    # func call args: indent relative to call, not paren
indent_func_def_param           = true    # func def params: indent relative to def, not paren
indent_func_proto_param         = true    # func proto params: indent relative to proto, not paren
indent_func_param_double        = false   # single indent for func call args (4 spaces)
indent_paren_nl                 = false   # don't use paren-alignment for continued lines

# ═══════════════════════════════════════════════════════════════════
# Spacing
# ═══════════════════════════════════════════════════════════════════

# Operators
sp_arith                        = force
sp_arith_additive               = force
sp_assign                       = force
sp_bool                         = force
sp_compare                      = force
sp_pp_concat                    = ignore  # ## in macros
sp_pp_stringify                 = ignore  # # in macros

# Pointers: "char *ptr" style (space before *, not after)
sp_before_ptr_star              = force
sp_after_ptr_star               = remove
sp_between_ptr_star             = remove
sp_before_ptr_star_func         = force

# Parentheses
sp_inside_paren                 = remove
sp_inside_square                = remove
sp_inside_paren_cast            = remove
sp_inside_fparen                = remove   # inside function parens
sp_inside_braces                = force
sp_inside_braces_struct         = force
sp_inside_braces_enum           = force
sp_paren_paren                  = remove   # no space between )(
sp_before_semi                  = remove
sp_after_semi                   = force    # space after ; in for loops
sp_after_semi_for               = force
sp_after_semi_for_empty         = remove

# Function calls/definitions
sp_func_def_paren               = remove   # func( not func (
sp_func_call_paren              = remove
sp_func_proto_paren             = remove
sp_func_class_paren             = remove
sp_return_paren                 = force    # return (x) -> return (x)
sp_sizeof_paren                 = remove   # sizeof(x) not sizeof (x)
sp_attribute_paren              = remove

# Casts
sp_after_cast                   = force    # (type) x, not (type)x

# Control statements
sp_before_sparen                = force    # space before ( in if/for/while/switch
sp_inside_sparen                = remove   # no space inside control parens

# Braces
sp_after_comma                  = force
sp_before_comma                 = remove

# Not/address/deref
sp_not                          = remove   # !x, not ! x
sp_addr                         = remove   # &x
sp_deref                        = remove   # *x (dereference, not declaration)
sp_inv                          = remove   # ~x
sp_sign                         = remove   # -x, +x

# Ternary
sp_cond_colon                   = force    # x ? y : z
sp_cond_question                = force

# Struct member
sp_member                       = remove   # x.y and x->y, no spaces

# ═══════════════════════════════════════════════════════════════════
# Newlines / Braces
# ═══════════════════════════════════════════════════════════════════

# K&R brace style: opening brace on same line
nl_if_brace                     = remove   # if (...) {
nl_else_brace                   = remove   # else {
nl_brace_else                   = remove   # } else
nl_elseif_brace                 = remove   # else if (...) {
nl_for_brace                    = remove   # for (...) {
nl_while_brace                  = remove   # while (...) {
nl_do_brace                     = remove   # do {
nl_brace_while                  = remove   # } while
nl_switch_brace                 = remove   # switch (...) {
nl_enum_brace                   = remove   # enum {
nl_struct_brace                 = remove   # struct {
nl_union_brace                  = remove   # union {
nl_fcall_brace                  = remove   # compound literals

# Function definitions: { on same line as closing )
nl_fdef_brace                   = remove   # ) { on same line

# Function parameter wrapping
nl_func_def_start               = remove   # ( on same line as function name
nl_func_def_args                = ignore   # let line length decide wrapping
nl_func_def_end                 = ignore   # ) placement when multi-line
nl_func_def_start_multi_line    = true     # force newline after ( when params wrap
nl_func_def_end_multi_line      = true     # force ) on own line when params wrap
nl_func_decl_start              = remove
nl_func_decl_args               = ignore
nl_func_decl_end                = ignore
nl_func_decl_start_multi_line   = true     # same for declarations
nl_func_decl_end_multi_line     = true

# Function calls: break after ( and ) on own line when wrapping
nl_func_call_start_multi_line   = true
nl_func_call_end_multi_line     = true

# After return type
nl_func_type_name               = remove   # return type and name on same line

# Empty braces
nl_create_if_one_liner          = false
nl_create_for_one_liner         = false
nl_create_while_one_liner       = false

# Blank lines
nl_max                          = 2       # max consecutive blank lines
nl_after_func_body              = 0       # don't enforce; let nl_max govern blank lines
nl_after_func_proto             = 0
nl_before_block_comment         = 0       # don't force blank lines before comments
nl_after_brace_close            = 0

# ═══════════════════════════════════════════════════════════════════
# Single-line statements
# ═══════════════════════════════════════════════════════════════════

# Allow short if/for/while on single line (without braces)
nl_if_leave_one_liners          = true
nl_for_leave_one_liners         = true
nl_while_leave_one_liners       = true

# ═══════════════════════════════════════════════════════════════════
# Code width and line wrapping
# ═══════════════════════════════════════════════════════════════════

code_width                      = 100
ls_for_split_full               = true    # split for() across lines if needed
ls_func_split_full              = true    # split function calls/defs if needed
ls_code_width                   = true    # honor code_width for splitting

# ═══════════════════════════════════════════════════════════════════
# Alignment
# ═══════════════════════════════════════════════════════════════════

# Struct/enum initializer alignment (the key feature over clang-format)
# Aligns = signs within designated initializers: .field = value
align_assign_span               = 0       # don't align regular assignments
align_assign_thresh             = 0       # max padding columns before alignment is abandoned
align_enum_equ_span             = 3       # align = in enums within 3-line span
align_enum_equ_thresh           = 0
align_struct_init_span          = 5       # align = in struct initializers within 5-line span
align_var_struct_span           = 0       # don't align struct member declarations

# Macro alignment
align_pp_define_span            = 0       # don't align #define values
align_pp_define_gap             = 0

# Trailing comment alignment
align_right_cmt_span            = 3       # align trailing comments within 3 lines
align_right_cmt_gap             = 2       # minimum gap before trailing comment

# Don't align variable declarations or assignments in general code
align_var_def_span              = 0
align_func_params               = 0       # don't align function parameters
align_same_func_call_params     = false   # don't align call arguments

# ═══════════════════════════════════════════════════════════════════
# Comments
# ═══════════════════════════════════════════════════════════════════

# Preserve existing comment style: /** \n * text \n */
cmt_star_cont                   = true    # continue * in multi-line comments
cmt_sp_before_star_cont         = 0       # 0 extra spaces before * (aligns with /**)
cmt_sp_after_star_cont          = 1       # 1 space after * continuation
cmt_c_nl_end                    = false   # don't force newline at end of /* */
cmt_width                       = 0       # don't reflow comment text
cmt_indent_multi                = false   # don't change indentation inside multi-line comments

# ═══════════════════════════════════════════════════════════════════
# Preprocessor
# ═══════════════════════════════════════════════════════════════════

pp_indent                       = remove  # don't indent preprocessor directives
pp_space_after                  = remove  # no space after #
pp_indent_at_level              = true    # indent #if/#else/#endif at brace level
pp_if_indent_code               = false   # don't indent code inside #if
pp_define_at_level              = true    # indent #define at brace level
pp_ignore_define_body           = true    # don't reformat macro bodies

# ═══════════════════════════════════════════════════════════════════
# Modifications
# ═══════════════════════════════════════════════════════════════════

# Don't add or remove braces (preserve manual style)
mod_full_brace_if               = ignore
mod_full_brace_for              = ignore
mod_full_brace_while            = ignore
mod_full_brace_do               = ignore
mod_add_long_ifdef_else_comment = 0       # don't add #endif comments
mod_remove_extra_semicolon      = true    # remove stray ;;
mod_sort_include                = false   # do NOT reorder includes
